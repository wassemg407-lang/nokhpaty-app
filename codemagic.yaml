workflows:
  nokhpaty-ios:
    name: Nokhpaty iOS Build
    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Capacitor iOS
        script: npm install @capacitor/ios

      - name: Capacitor Sync (safe mode)
        script: |
          chmod +x node_modules/.bin/* || true
          npx cap copy ios
          npx cap sync ios

    artifacts:
      - ios/**/*.ipa
      - ios/build/**
      - ios/App/build/**

    publishing:
      email:
        recipients:
          - wassemg407@gmail.com