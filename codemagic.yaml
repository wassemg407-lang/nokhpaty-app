workflows:
  nokhpaty-ios:
    name: Nokhpaty iOS Build

    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Build iOS App (SPM)
        script: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - ios/App/build/**
      - ios/**/*.xcarchive

    publishing:
      email:
        recipients:
          - wassemg407@gmail.com