workflows:
  nokhpaty-ios:
    name: Nokhpaty iOS Build
    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Capacitor iOS
        script: npm install @capacitor/ios

      - name: Capacitor Sync
        script: |
          npx cap copy ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install || true

      - name: Build iOS App (Archive)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - ios/App/build/*.xcarchive
      - ios/**/*.ipa
      - ios/build/**

    publishing:
      email:
        recipients:
          - wassemg407@gmail.com