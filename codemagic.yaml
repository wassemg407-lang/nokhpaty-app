workflows:
  nokhpaty-ios:
    name: Nokhpaty iOS Build
    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Capacitor iOS
        script: npm install @capacitor/ios

      - name: Sync Capacitor
        script: npx cap sync ios

    artifacts:
      - ios/**/*.ipa
      - ios/build/**

    publishing:
      email:
        recipients:
          - wassemg407@gmail.com