workflows:
  nokhpaty-ios:
    name: Nokhpaty iOS Build
    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Capacitor iOS
        script: npm install @capacitor/ios

      - name: Fix permissions
        script: chmod -R +x node_modules/.bin || true

      - name: Capacitor Sync (safe)
        script: |
          node node_modules/@capacitor/cli/bin/capacitor.js copy ios
          node node_modules/@capacitor/cli/bin/capacitor.js sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install || true

      - name: Build iOS App
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - ios/App/build/**
      - ios/**/*.xcarchive

    publishing:
      email:
        recipients:
          - wassemg407@gmail.com